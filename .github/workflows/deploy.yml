name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to push the built site to the gh-pages branch
permissions:
  contents: write

# Only one deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Standalone web app → dist/ (index.html + assets/). Must run before the
      # embed build: Vite empties dist/ here, then build:embed adds dist/embed/.
      - name: Build standalone app
        run: npm run build

      # Embeddable single-file bundle → dist/embed/meeting-finder.js
      - name: Build embed bundle
        run: npm run build:embed

      - name: Assemble site
        run: |
          # Serve the embed bundle from the site root (the URL the README documents).
          cp dist/embed/meeting-finder.js dist/meeting-finder.js
          # Disable Jekyll so GitHub Pages serves Vite's assets/ folder verbatim.
          touch dist/.nojekyll

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
